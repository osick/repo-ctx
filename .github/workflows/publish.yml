name: Publish to PyPI and GitHub Release

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  detect-version:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      new_version: ${{ steps.check.outputs.new_version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check if version changed
      id: check
      run: |
        # Extract version from pyproject.toml
        NEW_VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

        # Check if tag already exists
        if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
          echo "Tag v${NEW_VERSION} already exists — skipping publish"
          echo "version_changed=false" >> $GITHUB_OUTPUT
        else
          echo "New version detected: ${NEW_VERSION}"
          echo "version_changed=true" >> $GITHUB_OUTPUT
        fi

  build:
    name: Build distribution
    needs: detect-version
    if: needs.detect-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Build package
      run: uv build

    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs:
    - detect-version
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/repo-ctx

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs:
    - detect-version
    - publish-to-pypi
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create git tag
      env:
        NEW_VERSION: ${{ needs.detect-version.outputs.new_version }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
        git push origin "v${NEW_VERSION}"

    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Generate changelog
      id: changelog
      env:
        NEW_VERSION: ${{ needs.detect-version.outputs.new_version }}
      run: |
        # Get previous tag
        PREV_TAG=$(git tag --sort=-version:refname | grep -v "v${NEW_VERSION}" | head -1)

        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi

        cat > release_notes.md << EOF
        ## What's Changed

        ${CHANGELOG}

        **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${NEW_VERSION}

        ## Installation

        \`\`\`bash
        uvx repo-ctx
        \`\`\`

        Or install with pip:
        \`\`\`bash
        pip install repo-ctx==${NEW_VERSION}
        \`\`\`
        EOF

    - name: Create GitHub Release
      env:
        NEW_VERSION: ${{ needs.detect-version.outputs.new_version }}
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        body_path: release_notes.md
        tag_name: v${{ env.NEW_VERSION }}
        name: Release v${{ env.NEW_VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: false

  label-release:
    name: Label as released
    needs:
    - detect-version
    - github-release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add release label to issues
      env:
        NEW_VERSION: ${{ needs.detect-version.outputs.new_version }}
      uses: actions/github-script@v7
      with:
        script: |
          const version = process.env.NEW_VERSION;

          // Get commits in this release
          const commits = await github.rest.repos.compareCommits({
            owner: context.repo.owner,
            repo: context.repo.repo,
            base: 'HEAD~10',
            head: context.sha
          });

          // Extract issue numbers from commit messages
          const issueNumbers = new Set();
          for (const commit of commits.data.commits) {
            const matches = commit.commit.message.match(/#(\d+)/g);
            if (matches) {
              matches.forEach(match => {
                issueNumbers.add(parseInt(match.substring(1)));
              });
            }
          }

          // Add label to referenced issues
          for (const issueNumber of issueNumbers) {
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [`released-v${version}`]
              });
              console.log(`Added label to issue #${issueNumber}`);
            } catch (error) {
              console.log(`Could not label issue #${issueNumber}: ${error.message}`);
            }
          }
